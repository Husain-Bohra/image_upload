<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Plate Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --accent: #e8ff47;
            --accent2: #ff6b35;
            --text: #f0f0f0;
            --muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -1px;
            line-height: 1;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header p {
            color: var(--muted);
            margin-top: 8px;
            font-size: 14px;
        }

        .config-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .config-label {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .config-block input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        .config-block input:last-child { margin-bottom: 0; }

        .config-block input:focus {
            border-color: var(--accent);
        }

        .config-block input::placeholder { color: var(--muted); }

        /* THE UPLOAD ZONE — using a label trick for reliable file picking */
        .upload-zone {
            position: relative;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface);
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: #1a1a1a;
        }

        .upload-zone label {
            position: absolute;
            inset: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Hidden file input */
        #fileInput {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            overflow: hidden;
            z-index: -1;
        }

        .upload-icon {
            font-size: 40px;
            line-height: 1;
        }

        .upload-text {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--text);
            font-size: 15px;
        }

        .upload-hint {
            color: var(--muted);
            font-size: 12px;
        }

        /* Preview */
        .preview-block {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .preview-block img {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            display: block;
        }

        .preview-info {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .preview-name {
            font-size: 13px;
            color: var(--text);
            font-weight: 500;
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-size {
            font-size: 12px;
            color: var(--muted);
        }

        /* Buttons */
        .btn-upload {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-upload:hover { background: #d4eb2e; transform: translateY(-1px); }
        .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-cancel {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover { color: var(--text); border-color: #444; }

        /* Progress */
        .progress-wrap {
            display: none;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 2px;
        }

        /* Status */
        .status {
            display: none;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.5;
            word-break: break-all;
        }

        .status.success { background: #0f2a0f; color: #5eff5e; border: 1px solid #1a4a1a; }
        .status.error   { background: #2a0f0f; color: #ff6b6b; border: 1px solid #4a1a1a; }
        .status.loading { background: #1a1a0a; color: var(--accent); border: 1px solid #3a3a0a; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Food<span>.</span><br>Upload</h1>
        <p>Drop a meal photo → Supabase → Calorie pipeline</p>
    </div>

    <div class="config-block">
        <div class="config-label">⚙ Supabase Config</div>
        <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co">
        <input type="text" id="supabaseKey" placeholder="Anon key (eyJ... or sb_publishable_...)">
        <input type="text" id="bucketName" placeholder="Bucket name" value="food-images">
    </div>

    <!-- Upload zone using label trick — most reliable cross-browser -->
    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg,image/webp">
        <label for="fileInput">
            <span class="upload-icon">📸</span>
            <span class="upload-text">Click to select image</span>
            <span class="upload-hint">JPG, PNG, WEBP — up to 10MB</span>
        </label>
    </div>

    <div class="preview-block" id="previewBlock">
        <img id="previewImg" alt="Preview">
        <div class="preview-info">
            <span class="preview-name" id="previewName"></span>
            <span class="preview-size" id="previewSize"></span>
        </div>
    </div>

    <div class="status" id="status"></div>
    <div class="progress-wrap" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>

    <div id="actionBtns" style="display:none">
        <button class="btn-upload" id="uploadBtn">Upload to Supabase →</button>
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
    </div>
</div>

<script>
    let selectedFile = null;

    const fileInput    = document.getElementById('fileInput');
    const previewBlock = document.getElementById('previewBlock');
    const previewImg   = document.getElementById('previewImg');
    const previewName  = document.getElementById('previewName');
    const previewSize  = document.getElementById('previewSize');
    const uploadBtn    = document.getElementById('uploadBtn');
    const cancelBtn    = document.getElementById('cancelBtn');
    const actionBtns   = document.getElementById('actionBtns');
    const statusEl     = document.getElementById('status');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const uploadZone   = document.getElementById('uploadZone');

    // Load saved config
    window.addEventListener('load', () => {
        document.getElementById('supabaseUrl').value  = localStorage.getItem('sbUrl')  || '';
        document.getElementById('supabaseKey').value  = localStorage.getItem('sbKey')  || '';
        document.getElementById('bucketName').value   = localStorage.getItem('sbBucket') || 'food-images';
    });

    ['supabaseUrl','supabaseKey','bucketName'].forEach(id => {
        document.getElementById(id).addEventListener('input', e => {
            const map = { supabaseUrl:'sbUrl', supabaseKey:'sbKey', bucketName:'sbBucket' };
            localStorage.setItem(map[id], e.target.value);
        });
    });

    // Drag and drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = 'var(--accent)'; });
    uploadZone.addEventListener('dragleave', ()  => { uploadZone.style.borderColor = ''; });
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.style.borderColor = '';
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', e => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        if (file.size > 10 * 1024 * 1024) { showStatus('error', 'File too large — max 10MB'); return; }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = e => {
            previewImg.src = e.target.result;
            previewName.textContent = file.name;
            previewSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
            previewBlock.style.display = 'block';
            actionBtns.style.display = 'block';
            uploadZone.style.display = 'none';
            statusEl.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    uploadBtn.addEventListener('click', async () => {
        const url    = document.getElementById('supabaseUrl').value.trim();
        const key    = document.getElementById('supabaseKey').value.trim();
        const bucket = document.getElementById('bucketName').value.trim() || 'food-images';

        if (!url || !key) { showStatus('error', 'Fill in Supabase URL and Key first'); return; }
        if (!selectedFile) return;

        uploadBtn.disabled = true;
        showStatus('loading', 'Uploading...');
        progressWrap.style.display = 'block';
        progressFill.style.width = '40%';

        try {
            const sb = window.supabase.createClient(url, key);
            const filePath = `${Date.now()}_${selectedFile.name}`;

            const { error } = await sb.storage.from(bucket).upload(filePath, selectedFile, { upsert: false });
            if (error) throw error;

            progressFill.style.width = '100%';

            const { data: urlData } = sb.storage.from(bucket).getPublicUrl(filePath);
            const { error: dbError } = await sb.from('food-table').insert({ 
            image: urlData.publicUrl,
            image_name: selectedFile.name,
            image_url: urlData.publicUrl,
            status: 'pending'
});
if (dbError) throw new Error('DB insert failed: ' + dbError.message);
            showStatus('success', `✅ Uploaded!\n${urlData.publicUrl}`);
            setTimeout(reset, 4000);
        } catch (err) {
            showStatus('error', `❌ ${err.message}`);
            uploadBtn.disabled = false;
            progressFill.style.width = '0%';
        }
    });

    cancelBtn.addEventListener('click', reset);

    function reset() {
        selectedFile = null;
        fileInput.value = '';
        previewBlock.style.display = 'none';
        actionBtns.style.display = 'none';
        uploadZone.style.display = 'block';
        progressWrap.style.display = 'none';
        progressFill.style.width = '0%';
        uploadBtn.disabled = false;
        statusEl.style.display = 'none';
    }

    function showStatus(type, msg) {
        statusEl.className = `status ${type}`;
        statusEl.textContent = msg;
        statusEl.style.display = 'block';
    }
</script>
</body>
</html>
